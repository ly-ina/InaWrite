appId: com.inakb.novel
productName: Novel InaKB
directories:
  output: release
asar: true
files:
  - dist/**/*
  - dist-electron/**/*
  - public/**/*
win:
  target:
    - target: nsis
      arch: [x64]
  icon: public/favicon.svg
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Novel InaKB
mac:
  target: [dmg, zip]
  icon: public/favicon.svg
  category: public.app-category.productivity
linux:
  target: [AppImage, deb]
  icon: public/favicon.svg
  category: Office
