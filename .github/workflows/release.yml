name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/inakb-release.keystore

      - name: Build frontend
        run: npx vite build

      - name: Sync Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-pc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Build Electron
        run: |
          npx tsc -p electron/tsconfig.json
          node scripts/rename-electron.cjs

      - name: Package Electron
        run: npx electron-builder --win --dir

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Novel-InaKB.exe
          path: release/win-unpacked/Novel InaKB.exe

  release:
    needs: [build-android, build-pc]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release.apk

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: Novel-InaKB.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            Novel-InaKB.exe
          body: |
            ## 更新说明

            versionCode=自动递增

            - Android: app-release.apk（覆盖安装，保留数据）
            - PC: Novel-InaKB.exe（解压后替换旧版）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
