name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/inakb-release.keystore

      - name: Switch gradle to online download
        run: |
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.14.3-all.zip
          networkTimeout=180000
          validateDistributionUrl=false
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Build frontend
        run: npx vite build

      - name: Sync Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-pc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build

      - name: Build Electron
        run: |
          npx tsc -p electron/tsconfig.json
          node scripts/rename-electron.cjs

      - name: Package Electron
        run: npx electron-builder --win --dir

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Novel-InaKB.exe
          path: release/win-unpacked/Novel InaKB.exe

  release:
    needs: [build-android, build-pc]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read versionCode
        id: version
        run: |
          VC=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle)
          echo "vc=$VC" >> $GITHUB_OUTPUT

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release.apk

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: Novel-InaKB.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release.apk
            Novel-InaKB.exe
          body: |
            ## v${{ github.ref_name }}

            versionCode=${{ steps.version.outputs.vc }}

            ### 更新内容
            - 🎨 全新 OTA 更新弹窗 UI
            - 🔍 关于页面版本检测
            - 🏷️ 标签筛选多选 + 通用搜索选择器
            - 📖 章节排序/跳转
            - 🔮 伏笔可搜索筛选
            - 🐛 修复 PC 端更新检测

            ### 下载
            - 📱 Android: app-release.apk（覆盖安装，保留数据）
            - 🖥️ PC: Novel-InaKB.exe（解压后替换旧版）
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
